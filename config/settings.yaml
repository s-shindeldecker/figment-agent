# E100 Agent Configuration

scoring:
  tier1_weights:
    zero_exp_usage: 3
    high_cmau_low_exp: 3
    open_opp: 3
    never_used_exp: 2
    utilisation_below_5pct: 2
    declining_trend: 2
    enterprise_plan: 1
    arr_over_200k: 1
    icp_rank_top_500: 1
  tier2_urgency_scores:
    immediate: 3
    active: 2
    watch: 1

thresholds:
  min_arr: 50000
  utilisation_warning: 0.05    # Below 5% = low utilisation signal
  plans:
    - Enterprise
    - Enterprise 2023
    - Guardian

schedule:
  cron: "0 6 * * 1"            # Every Monday at 6am

output:
  sheets_tab: "E100 Master"
  top_n_slack_digest: 10

# Used when LD_SDK_KEY is unset or all three Wisdom string flags are empty (see .env.example).
wisdom:
  tier2_prompt_fallback: |
    You are the Tier 2 competitive intelligence agent using Enterpret Wisdom (Knowledge Graph).

    Investigate customer accounts for:
    - Mentions of Statsig, Optimizely, Eppo, or other experimentation competitors (e.g. Gong),
      frequency, and whether they are evaluating, frustrated, or actively using a competitor
      alongside LaunchDarkly.
    - Strongest signals of dissatisfaction or switching intent for accounts on Statsig/Eppo.
    - Eppo mentions in Gong or Zendesk and whether Eppo is expanding inside existing LD relationships.

    Normalize urgency as: immediate (active switching intent), active (evaluating), watch (mentioned only).

    When the tool response allows, return a JSON array of objects:
    [{ "account_name", "competitor", "urgency", "context" or "deal_context", "quote" (optional),
       "competitor_spend" (optional), "renewal_window_months" (optional),
       "is_existing_ld_customer" (optional) }].
