[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "figment-agent"
version = "0.1.0"
description = "E100 expansion list automation via LaunchDarkly Agent Graphs"
requires-python = ">=3.9"
dependencies = [
    "launchdarkly-server-sdk>=9.14",
    "launchdarkly-server-sdk-ai>=0.16",
    "requests>=2.31",
    "gspread>=6.0",
    "google-auth>=2.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
include = ["agents*", "core*", "outputs*", "bootstrap*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
