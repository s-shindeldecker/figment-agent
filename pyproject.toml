[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "figment-agent"
version = "0.1.0"
description = "E100 expansion list automation via LaunchDarkly Agent Graphs"
requires-python = ">=3.11"
dependencies = [
    "launchdarkly-server-sdk>=9.0",
    "launchdarkly-ai>=0.1",
    "requests>=2.31",
    "gspread>=6.0",
    "google-auth>=2.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
